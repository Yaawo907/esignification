services:
  - type: web
    name: esignification
    env: python
    region: frankfurt  # Le plus proche de l'Afrique de l'Ouest
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn esignification.wsgi:application"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: esignification.settings
      - key: DATABASE_URL
        fromDatabase:
          name: esignification-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      # Email SMTP (Gmail)
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        sync: false  # À définir manuellement dans le dashboard Render
      - key: EMAIL_HOST_PASSWORD
        sync: false  # Mot de passe d'application Gmail (pas le mot de passe normal)

databases:
  - name: esignification-db
    databaseName: esignification
    user: esignification
    plan: free
