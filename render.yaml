services:
  - type: web
    name: esignification
    env: python
    region: frankfurt  # Le plus proche de l'Afrique de l'Ouest
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn esignification.wsgi:application --timeout 120 --workers 2"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: esignification.settings
      - key: DATABASE_URL
        fromDatabase:
          name: esignification-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      # Email SMTP (Hostinger)
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend
      - key: EMAIL_HOST
        value: smtp.hostinger.com
      - key: EMAIL_PORT
        value: "465"
      - key: EMAIL_USE_TLS
        value: "False"
      - key: EMAIL_USE_SSL
        value: "True"
      - key: EMAIL_HOST_USER
        sync: false  # À définir manuellement dans le dashboard Render (ex: noreply@esignification.bj)
      - key: EMAIL_HOST_PASSWORD
        sync: false  # Mot de passe du compte email Hostinger
      - key: DEFAULT_FROM_EMAIL
        sync: false  # Même valeur que EMAIL_HOST_USER

databases:
  - name: esignification-db
    databaseName: esignification
    user: esignification
    plan: free
