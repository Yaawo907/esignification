{% extends 'base/base.html' %}
{% block title %}Envoyer une réponse{% endblock %}
{% block body_class %}dashboard-page{% endblock %}
{% block body %}
<div class="auth-container" style="max-width:560px;">
  <div class="auth-card">
    <h2 class="auth-title">Envoyer votre réponse</h2>
    <p class="auth-subtitle">Signification : <strong>{{ sig.reference }}</strong></p>
    <form method="post" enctype="multipart/form-data" novalidate>
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Fichier de réponse (PDF ou document scanné) *</label>
        <input type="file" name="fichier_reponse" class="form-input" required>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;">
        <a href="{% url 'justiciables:tableau_de_bord' %}" class="btn btn-ghost">Annuler</a>
        <button type="submit" class="btn btn-primary btn-spinner" data-loading="Envoi…">
          <span class="btn-text">Informer l'huissier</span>
          <span class="btn-loader" style="display:none;"></span>
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
